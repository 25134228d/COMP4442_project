<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Bookings - BuffetEase</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/src/main/resources/static/js/my-bookings.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />

  <style src="/src/main/resources/static/assets/my-bookings.css"></style>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');

    .serif {
      font-family: 'Playfair Display', serif;
    }

    .brand-olive,
    .text-brand-olive {
      color: #4a7043;
    }

    .nav-active {
      color: #4a7043;
      font-weight: 600;
      border-bottom: 2px solid #4a7043;
      padding-bottom: 2px;
    }
  </style>
</head>

<body class="bg-gray-50">
  <nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
      <a href="index.html" class="flex items-center gap-3">
        <i class="fa-solid fa-utensils text-3xl text-brand-olive"></i>
        <h1 class="text-3xl serif font-bold">BuffetEase</h1>
      </a>
      <div class="flex gap-8 text-lg">
        <a href="index.html" class="hover:text-brand-olive transition">Home</a>
        <a href="packages.html" class="hover:text-brand-olive transition">Packages</a>
        <a href="menu.html" class="hover:text-brand-olive transition">Menu</a>
        <a href="about.html" class="hover:text-brand-olive transition">About</a>
        <a href="my-bookings.html" class="nav-active">My Bookings</a>
      </div>
    </div>
  </nav>

  <div class="max-w-5xl mx-auto px-6 py-20">
    <h1 class="text-5xl serif mb-8">My Reservations</h1>
    <div id="bookings-list" class="space-y-8"></div>
  </div>

  <script>
    const bookings = JSON.parse(localStorage.getItem('buffetBookings')) || [];

    function renderBookings() {
      const container = document.getElementById('bookings-list');
      if (bookings.length === 0) {
        container.innerHTML = `<p class="text-center text-gray-500 py-20">You have no reservations yet.</p>`;
        return;
      }

      container.innerHTML = bookings.map(b => `
        <div class="bg-white rounded-3xl p-8 shadow">
          <div class="flex justify-between">
            <div>
              <h3 class="text-2xl serif">${b.packageName}</h3>
              <p class="text-gray-600">${b.date} • ${b.time}</p>
              <p class="mt-2">${b.guestCount} Guests</p>
            </div>
            <div class="text-right">
              <span class="px-4 py-1 text-xs font-bold bg-green-100 text-green-700 rounded-full">${b.status}</span>
              <div class="mt-4 text-3xl font-bold text-brand-olive">$${b.total}</div>
            </div>
          </div>
        </div>
      `).join('');
    }

    window.onload = renderBookings;
  </script>
</body>

</html>
