<!DOCTYPE html>
<!-- packages.html — Packages & Booking Page
     Shows all buffet packages fetched from the API and allows customers to make bookings.
     This is the most interactive page — it makes multiple API calls and has a booking modal.
     URL: http://localhost:8080/packages.html -->
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Packages - BuffetEase</title>
    <!-- Tailwind CSS — provides utility classes like grid, flex, rounded-3xl, etc. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome — provides icons used throughout (spinner, exclamation, etc.) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
    <style>
        /* Playfair Display — elegant serif font for headings */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');
        .serif { font-family: 'Playfair Display', serif; }
        .brand-olive { color: #4a7043; } /* Restaurant brand colour used for accents */
    </style>
</head>
<body class="bg-gray-50">

    <!-- ═══════════════════════════════════════════════════════
         REUSABLE MESSAGE BOX (success / error / info popup)
         hidden class = invisible by default.
         JavaScript's showMessage() removes "hidden" to display it,
         and hideMessage() adds "hidden" back to close it.
         z-[70] — high z-index so it appears above the booking modal.
    ═══════════════════════════════════════════════════════ -->
    <div id="message-box" class="hidden fixed inset-0 z-[70] flex items-center justify-center bg-black/45 px-4">
        <div class="w-full max-w-md rounded-3xl bg-white px-6 py-6 shadow-2xl">
            <div class="flex items-start gap-4">
                <!-- Coloured circle icon (green = success, red = error, blue = info) — set by JS -->
                <div id="message-icon" class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-white"></div>
                <div class="min-w-0 flex-1">
                    <!-- Title and body text are set dynamically by showMessage() in JavaScript -->
                    <div id="message-title" class="text-lg font-semibold text-gray-900"></div>
                    <div id="message-text" class="mt-2 text-sm leading-relaxed text-gray-600 whitespace-pre-line"></div>
                </div>
            </div>
            <div class="mt-6 flex justify-end">
                <!-- OK button calls hideMessage() to close the popup -->
                <button id="message-close" class="rounded-full bg-[#4a7043] px-6 py-2.5 text-sm font-semibold text-white hover:bg-[#3e5f39]">OK</button>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════
         NAVIGATION BAR
         "Packages" link is highlighted (text-brand-olive font-semibold)
         to show the current active page.
    ═══════════════════════════════════════════════════════ -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3">
                <i class="fa-solid fa-utensils text-3xl text-brand-olive"></i>
                <h1 class="text-3xl serif font-bold">BuffetEase</h1>
            </a>
            <div class="flex gap-8 text-lg">
                <a href="index.html">Home</a>
                <a href="packages.html" class="text-brand-olive font-semibold">Packages</a> <!-- Active page -->
                <a href="about.html">About</a>
                <a href="my-bookings.html">My Bookings</a>
            </div>
        </div>
    </nav>

    <!-- ═══════════════════════════════════════════════════════
         PACKAGES GRID
         #packages-grid starts with a loading spinner.
         renderPackages() replaces this with actual package cards once the API responds.
         md:grid-cols-2 lg:grid-cols-3 — 2 columns on medium screens, 3 on large.
    ═══════════════════════════════════════════════════════ -->
    <div class="max-w-7xl mx-auto px-6 py-20">
        <h1 class="text-6xl serif text-center mb-4">Our Packages</h1>
        <p class="text-center text-xl text-gray-600 mb-16">Choose your perfect dining experience</p>

        <!-- This div is populated dynamically by renderPackages() in JavaScript -->
        <div id="packages-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-10">
            <!-- Loading spinner shown while API call is in progress -->
            <div class="col-span-3 text-center py-12">
                <i class="fa-solid fa-spinner fa-spin text-4xl text-brand-olive"></i>
                <p class="mt-4 text-gray-600">Loading packages...</p>
            </div>
        </div>
    </div>

    <script>
        // API_BASE is empty string — all API calls are relative to the same server.
        // e.g. fetch('/api/packages') → http://localhost:8080/api/packages
        const API_BASE = '';

        // currentPackage — stores the package object selected when "Book This Package" is clicked.
        // Used to calculate total price and include packageId in the booking request.
        let currentPackage = null;

        // selectedSession — stores the session object the customer clicked in the booking modal.
        // Used to include sessionId in the booking request.
        let selectedSession = null;

        // ─── showMessage(type, title, message) ───────────────────────────────────────
        // Reusable function to display a popup with a coloured icon, title, and message.
        // type: 'success' (green), 'error' (red), or 'info' (blue)
        function showMessage(type, title, message) {
            const box = document.getElementById('message-box');
            const icon = document.getElementById('message-icon');
            const titleNode = document.getElementById('message-title');
            const messageNode = document.getElementById('message-text');
            // Map the type string to CSS colour classes and Font Awesome icon names.
            const styles = {
                success: { icon: 'bg-green-600', symbol: 'fa-check' },
                error:   { icon: 'bg-red-600',   symbol: 'fa-triangle-exclamation' },
                info:    { icon: 'bg-blue-600',   symbol: 'fa-circle-info' }
            };
            const theme = styles[type] || styles.info; // Default to info style if unknown type.

            // Set the icon's background colour and the Font Awesome icon inside it.
            icon.className = `flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-white ${theme.icon}`;
            icon.innerHTML = `<i class="fa-solid ${theme.symbol}"></i>`;
            titleNode.textContent = title;
            messageNode.textContent = message;
            box.classList.remove('hidden'); // Make the message box visible.
        }

        // ─── hideMessage() ────────────────────────────────────────────────────────────
        // Hides the message box by adding the "hidden" CSS class.
        function hideMessage() {
            document.getElementById('message-box').classList.add('hidden');
        }

        // Attach click listener to the "OK" button to close the message box.
        document.getElementById('message-close').addEventListener('click', hideMessage);
        // Also close the message box if the user clicks on the dark overlay (outside the box).
        document.getElementById('message-box').addEventListener('click', (event) => {
            if (event.target.id === 'message-box') { // Only close if clicking the backdrop.
                hideMessage();
            }
        });

        // ─── renderPackages() ─────────────────────────────────────────────────────────
        // Fetches all packages from the API and renders them as cards in the grid.
        // Called automatically when the page loads (see window.onload at the bottom).
        // 'async' allows the use of 'await' inside the function.
        async function renderPackages() {
            const container = document.getElementById('packages-grid');
            
            try {
                // Fetch all packages: GET /api/packages
                // 'await' pauses here until the HTTP response arrives.
                const response = await fetch(`${API_BASE}/api/packages`);
                
                // If the server returned an error status (4xx/5xx), throw an error.
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                // Parse the JSON response body into a JavaScript array of package objects.
                const packages = await response.json();
                
                // Handle the edge case where the API returns an empty array.
                if (!packages || packages.length === 0) {
                    container.innerHTML = '<p class="text-center text-gray-500 col-span-3">No packages available at the moment.</p>';
                    return;
                }
                
                // .map() transforms each package object into an HTML card string.
                // .join('') concatenates all the card strings into one HTML string.
                // The result is set as the grid's innerHTML, replacing the loading spinner.
                container.innerHTML = packages.map(pkg => `
                    <div class="bg-white rounded-3xl overflow-hidden shadow-lg hover:shadow-2xl transition-all">
                        <div class="relative h-64">
                            <!-- Package image; onerror shows a placeholder if the URL fails to load -->
                            <img src="${pkg.imageUrl}" class="w-full h-full object-cover" alt="${pkg.name}" onerror="this.src='https://via.placeholder.com/400x300?text=Buffet+Image'">
                            <!-- Package type badge (e.g. "Dinner", "Brunch") in top-right corner -->
                            <div class="absolute top-4 right-4 bg-white px-4 py-1 rounded-full text-xs font-bold uppercase">${pkg.type}</div>
                        </div>
                        <div class="p-8">
                            <h3 class="serif text-2xl mb-2">${pkg.name}</h3>
                            <!-- Truncate description to 100 chars to keep cards the same height -->
                            <p class="text-gray-600 mb-6">${pkg.description.substring(0, 100)}${pkg.description.length > 100 ? '...' : ''}</p>
                            <div class="flex justify-between items-end mb-6">
                                <div>
                                    <span class="text-4xl font-bold text-brand-olive">$${pkg.pricePerPerson}</span>
                                    <span class="text-gray-500"> / person</span>
                                </div>
                            </div>
                            <!-- onclick passes pkg.id to openBookingModal() to open the correct package -->
                            <button onclick="openBookingModal(${pkg.id})" 
                                    class="w-full bg-green-800 text-white py-4 rounded-full font-semibold hover:bg-green-900 transition">
                                Book This Package
                            </button>
                        </div>
                    </div>
                `).join('');
                
            } catch (error) {
                // If anything goes wrong (network error, server down), show an error state.
                container.innerHTML = `
                    <div class="col-span-3 text-center py-12">
                        <i class="fa-solid fa-circle-exclamation text-5xl text-red-500 mb-4"></i>
                        <p class="text-red-500 font-bold mb-2">Failed to load packages.</p>
                        <p class="text-gray-600 mb-4">Please make sure the backend server is running.</p>
                        <!-- "Retry" button calls renderPackages() again -->
                        <button onclick="renderPackages()" class="mt-4 bg-brand-olive text-white px-6 py-2 rounded-full hover:bg-green-800">
                            Retry
                        </button>
                    </div>
                `;
            }
        }

        // ─── openBookingModal(packageId) ──────────────────────────────────────────────
        // Called when the customer clicks "Book This Package" on a package card.
        // Fetches the package details and its available sessions, then shows the booking modal.
        async function openBookingModal(packageId) {
            try {
                // Fetch the full package details: GET /api/packages/{packageId}
                const pkgResponse = await fetch(`${API_BASE}/api/packages/${packageId}`);
                if (!pkgResponse.ok) throw new Error('Failed to fetch package');
                currentPackage = await pkgResponse.json(); // Store globally for use in confirmBooking()
                
                // Fetch upcoming sessions for this package: GET /api/packages/{packageId}/sessions
                const sessionsResponse = await fetch(`${API_BASE}/api/packages/${packageId}/sessions`);
                if (!sessionsResponse.ok) throw new Error('Failed to fetch sessions');
                const sessions = await sessionsResponse.json();
                
                // Show the package name in the modal header.
                document.getElementById('modal-package-name').textContent = currentPackage.name;
                // Make the booking modal visible by removing "hidden".
                document.getElementById('booking-modal').classList.remove('hidden');
                // Hide the booking form until the customer selects a session.
                document.getElementById('booking-form').classList.add('hidden');
                // Prevent the page from scrolling behind the modal.
                document.body.style.overflow = 'hidden';
                
                // Render the session buttons inside the modal.
                renderSessions(sessions);
            } catch (error) {
                showMessage('error', 'Could not open booking', 'Failed to load session details. Please try again.');
            }
        }

        // ─── renderSessions(sessions) ─────────────────────────────────────────────────
        // Renders the available time-slot buttons inside the booking modal.
        // Each button shows: date, session label (e.g. "Early Dinner 6 PM"), and seats left.
        function renderSessions(sessions) {
            const container = document.getElementById('session-list');
            if (!sessions || sessions.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 col-span-2">No available sessions for this package.</p>';
                return;
            }
            
            container.innerHTML = sessions.map(session => `
                <!-- Each button has data-* attributes storing session data for selectSession() -->
                <button onclick="selectSession(this, ${session.id})" 
                        data-session-id="${session.id}"
                        data-session-date="${session.date}"
                        data-session-label="${session.sessionLabel}"
                        class="session-btn p-6 border-2 border-transparent hover:border-brand-olive rounded-2xl text-left bg-white w-full">
                    <!-- Format the date as "Monday, May 10, 2026" using the browser's Intl API -->
                    <div class="font-semibold">${new Date(session.date).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</div>
                    <div class="text-xl font-bold mt-1">${session.sessionLabel}</div>
                    <div class="text-green-600 mt-3">${session.availableSeats} seats left</div>
                </button>
            `).join('');
        }

        // ─── selectSession(btn, sessionId) ────────────────────────────────────────────
        // Called when the customer clicks a session button.
        // Highlights the selected button and shows the guest information form.
        function selectSession(btn, sessionId) {
            // Remove highlight from all session buttons first.
            document.querySelectorAll('.session-btn').forEach(b => b.classList.remove('border-brand-olive', 'bg-green-50'));
            // Add highlight (olive border + green background) to the clicked button.
            btn.classList.add('border-brand-olive', 'bg-green-50');
            
            // Store the selected session info using the button's data-* attributes.
            selectedSession = {
                id: sessionId,
                date: btn.dataset.sessionDate,
                label: btn.dataset.sessionLabel
            };
            // Show the guest information form now that a session is selected.
            document.getElementById('booking-form').classList.remove('hidden');
            updateTotal(); // Calculate and display the initial total price.
        }

        // ─── updateTotal() ────────────────────────────────────────────────────────────
        // Recalculates and displays the total price whenever the guest count changes.
        // Called by oninput on the guest-count input field and by selectSession().
        function updateTotal() {
            if (!currentPackage) return; // Safety guard — do nothing if no package selected.
            const guests = parseInt(document.getElementById('guest-count').value) || 1;
            const total = currentPackage.pricePerPerson * guests; // pricePerPerson × guestCount
            document.getElementById('total-price').textContent = `$${total}`; // Update display.
        }

        // ─── confirmBooking() ─────────────────────────────────────────────────────────
        // Called when the customer clicks "Confirm Reservation".
        // Validates the form, sends the booking to the API, and handles the response.
        async function confirmBooking() {
            // Guard: make sure a session has been selected.
            if (!selectedSession) {
                showMessage('error', 'Missing session', 'Please select a session.');
                return;
            }
            
            // Read and trim the form field values.
            const name  = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const guestCount = parseInt(document.getElementById('guest-count').value);
            
            // Front-end validation: ensure required fields are not empty.
            if (!name || !email || !phone) {
                showMessage('error', 'Missing guest information', 'Please fill in all guest information fields.');
                return;
            }
            
            // Build the JSON payload to send to POST /api/bookings.
            // Must match the fields in BookingRequestDTO.java.
            const bookingData = {
                packageId: currentPackage.id,       // Which package is being booked.
                sessionId: selectedSession.id,       // Which time slot is being booked.
                customerName: name,
                customerEmail: email,
                customerPhone: phone,
                guestCount: guestCount,
                specialRequests: document.getElementById('special-request').value // Optional.
            };
            
            try {
                // Send the booking request to the backend: POST /api/bookings
                // 'Content-Type': 'application/json' tells Spring to parse the body as JSON.
                const response = await fetch(`${API_BASE}/api/bookings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bookingData) // Convert the JS object to a JSON string.
                });
                
                const result = await response.json(); // Parse the response body.
                
                if (response.ok) {
                    // Success: show the booking reference number to the customer.
                    showMessage('success', 'Reservation successful', `Booking reference: ${result.bookingReference}\nTotal: $${result.booking.totalPrice}\nYou can view it in My Bookings.`);
                    // Save the email in localStorage so My Bookings can auto-fill it.
                    localStorage.setItem('buffetEaseEmail', email);
                    closeModal(); // Close the booking modal.
                    // Reset all form fields back to defaults.
                    document.getElementById('name').value = '';
                    document.getElementById('email').value = '';
                    document.getElementById('phone').value = '852-';
                    document.getElementById('guest-count').value = '2';
                    document.getElementById('special-request').value = '';
                } else {
                    // Server returned an error (e.g. no seats left, past session).
                    showMessage('error', 'Unable to create booking', result.error || 'Failed to create booking');
                }
            } catch (error) {
                // Network error — the backend might not be running.
                showMessage('error', 'Connection failed', 'Failed to create booking. Please make sure the backend server is running.');
            }
        }

        // ─── closeModal() ─────────────────────────────────────────────────────────────
        // Hides the booking modal and resets the selected session.
        function closeModal() {
            document.getElementById('booking-modal').classList.add('hidden');
            selectedSession = null; // Clear the session so the form resets next time.
            document.body.style.overflow = 'auto'; // Restore body scrolling.
        }

        // ─── window.onload ────────────────────────────────────────────────────────────
        // Runs automatically when the page finishes loading.
        // Triggers the initial API call to populate the packages grid.
        window.onload = () => {
            renderPackages();
        };
    </script>

    <!-- ═══════════════════════════════════════════════════════
         BOOKING MODAL
         hidden by default; shown when openBookingModal() is called.
         Contains two sections:
           1. Session list (#session-list) — populated by renderSessions().
           2. Guest information form (#booking-form) — shown after selecting a session.
    ═══════════════════════════════════════════════════════ -->
    <div id="booking-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl max-w-4xl w-full mx-4 max-h-[95vh] overflow-hidden">
            <!-- Modal header: shows the package name and a close (×) button -->
            <div class="p-8 border-b flex justify-between">
                <h3 id="modal-package-name" class="text-3xl serif"></h3>
                <!-- &times; is the HTML entity for × (the close symbol) -->
                <button onclick="closeModal()" class="text-4xl leading-none hover:text-gray-400">&times;</button>
            </div>
            
            <!-- Scrollable content area: session buttons + booking form -->
            <div class="p-8 overflow-auto" style="max-height: 70vh;">
                <!-- #session-list: filled by renderSessions() with clickable time-slot buttons -->
                <div id="session-list" class="grid sm:grid-cols-2 gap-4 mb-10"></div>
                
                <!-- #booking-form: hidden until a session is selected; shown by selectSession() -->
                <div id="booking-form" class="hidden bg-green-50 p-8 rounded-2xl">
                    <h4 class="text-2xl serif mb-6">Guest Information</h4>
                    <div class="grid md:grid-cols-2 gap-6">
                        <!-- Full name input — maps to BookingRequestDTO.customerName -->
                        <div>
                            <label class="block text-sm font-medium mb-2">Full Name</label>
                            <input id="name" type="text" class="w-full border rounded-2xl px-6 py-4" placeholder="Chan Tai Man"/>
                        </div>
                        <!-- Email input — maps to BookingRequestDTO.customerEmail -->
                        <div>
                            <label class="block text-sm font-medium mb-2">Email</label>
                            <input id="email" type="email" class="w-full border rounded-2xl px-6 py-4" placeholder="you@example.com"/>
                        </div>
                        <!-- Phone input — pre-filled with "852-" (Hong Kong country code) -->
                        <div>
                            <label class="block text-sm font-medium mb-2">Phone</label>
                            <input id="phone" type="tel" value="852-" class="w-full border rounded-2xl px-6 py-4" maxlength="12"/>
                        </div>
                        <!-- Guest count input — oninput="updateTotal()" recalculates price on every keystroke -->
                        <div>
                            <label class="block text-sm font-medium mb-2">Number of Guests</label>
                            <input id="guest-count" type="number" min="1" value="2" class="w-full border rounded-2xl px-6 py-4" oninput="updateTotal()"/>
                        </div>
                    </div>
                    <!-- Optional special requests textarea — maps to BookingRequestDTO.specialRequests -->
                    <div class="mt-6">
                        <label class="block text-sm font-medium mb-2">Special Requests</label>
                        <textarea id="special-request" rows="3" class="w-full border rounded-2xl px-6 py-4"></textarea>
                    </div>
                </div>
            </div>

            <!-- Modal footer: shows the calculated total price and the confirm button -->
            <div class="p-8 border-t bg-gray-50 flex justify-between items-center">
                <div>
                    <span class="text-gray-500">Total</span>
                    <!-- #total-price is updated by updateTotal() whenever guestCount changes -->
                    <div id="total-price" class="text-4xl font-bold text-brand-olive"></div>
                </div>
                <!-- Confirm button calls confirmBooking() which sends POST /api/bookings -->
                <button onclick="confirmBooking()" class="bg-green-800 hover:bg-green-900 text-white px-12 py-5 rounded-full text-lg font-semibold transition-colors">
                    Confirm Reservation
                </button>
            </div>
        </div>
    </div>
</body>
</html>
