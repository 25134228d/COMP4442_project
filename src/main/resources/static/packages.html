<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Packages - BuffetEase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap');
        .serif { font-family: 'Playfair Display', serif; }
        .brand-olive { color: #4a7043; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="message-box" class="hidden fixed inset-0 z-[70] flex items-center justify-center bg-black/45 px-4">
        <div class="w-full max-w-md rounded-3xl bg-white px-6 py-6 shadow-2xl">
            <div class="flex items-start gap-4">
                <div id="message-icon" class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-white"></div>
                <div class="min-w-0 flex-1">
                    <div id="message-title" class="text-lg font-semibold text-gray-900"></div>
                    <div id="message-text" class="mt-2 text-sm leading-relaxed text-gray-600 whitespace-pre-line"></div>
                </div>
            </div>
            <div class="mt-6 flex justify-end">
                <button id="message-close" class="rounded-full bg-[#4a7043] px-6 py-2.5 text-sm font-semibold text-white hover:bg-[#3e5f39]">OK</button>
            </div>
        </div>
    </div>

    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-3">
                <i class="fa-solid fa-utensils text-3xl text-brand-olive"></i>
                <h1 class="text-3xl serif font-bold">BuffetEase</h1>
            </a>
            <div class="flex gap-8 text-lg">
                <a href="index.html">Home</a>
                <a href="packages.html" class="text-brand-olive font-semibold">Packages</a>
                <a href="about.html">About</a>
                <a href="my-bookings.html">My Bookings</a>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-20">
        <h1 class="text-6xl serif text-center mb-4">Our Packages</h1>
        <p class="text-center text-xl text-gray-600 mb-16">Choose your perfect dining experience</p>

        <div id="packages-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-10">
            <div class="col-span-3 text-center py-12">
                <i class="fa-solid fa-spinner fa-spin text-4xl text-brand-olive"></i>
                <p class="mt-4 text-gray-600">Loading packages...</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let currentPackage = null;
        let selectedSession = null;

        function showMessage(type, title, message) {
            const box = document.getElementById('message-box');
            const icon = document.getElementById('message-icon');
            const titleNode = document.getElementById('message-title');
            const messageNode = document.getElementById('message-text');
            const styles = {
                success: { icon: 'bg-green-600', symbol: 'fa-check' },
                error: { icon: 'bg-red-600', symbol: 'fa-triangle-exclamation' },
                info: { icon: 'bg-blue-600', symbol: 'fa-circle-info' }
            };
            const theme = styles[type] || styles.info;

            icon.className = `flex h-8 w-8 shrink-0 items-center justify-center rounded-full text-white ${theme.icon}`;
            icon.innerHTML = `<i class="fa-solid ${theme.symbol}"></i>`;
            titleNode.textContent = title;
            messageNode.textContent = message;
            box.classList.remove('hidden');
        }

        function hideMessage() {
            document.getElementById('message-box').classList.add('hidden');
        }

        document.getElementById('message-close').addEventListener('click', hideMessage);
        document.getElementById('message-box').addEventListener('click', (event) => {
            if (event.target.id === 'message-box') {
                hideMessage();
            }
        });

        async function renderPackages() {
            const container = document.getElementById('packages-grid');
            
            try {
                const response = await fetch(`${API_BASE}/api/packages`);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const packages = await response.json();
                
                if (!packages || packages.length === 0) {
                    container.innerHTML = '<p class="text-center text-gray-500 col-span-3">No packages available at the moment.</p>';
                    return;
                }
                
                container.innerHTML = packages.map(pkg => `
                    <div class="bg-white rounded-3xl overflow-hidden shadow-lg hover:shadow-2xl transition-all">
                        <div class="relative h-64">
                            <img src="${pkg.imageUrl}" class="w-full h-full object-cover" alt="${pkg.name}" onerror="this.src='https://via.placeholder.com/400x300?text=Buffet+Image'">
                            <div class="absolute top-4 right-4 bg-white px-4 py-1 rounded-full text-xs font-bold uppercase">${pkg.type}</div>
                        </div>
                        <div class="p-8">
                            <h3 class="serif text-2xl mb-2">${pkg.name}</h3>
                            <p class="text-gray-600 mb-6">${pkg.description.substring(0, 100)}${pkg.description.length > 100 ? '...' : ''}</p>
                            <div class="flex justify-between items-end mb-6">
                                <div>
                                    <span class="text-4xl font-bold text-brand-olive">$${pkg.pricePerPerson}</span>
                                    <span class="text-gray-500"> / person</span>
                                </div>
                            </div>
                            <button onclick="openBookingModal(${pkg.id})" 
                                    class="w-full bg-green-800 text-white py-4 rounded-full font-semibold hover:bg-green-900 transition">
                                Book This Package
                            </button>
                        </div>
                    </div>
                `).join('');
                
            } catch (error) {
                container.innerHTML = `
                    <div class="col-span-3 text-center py-12">
                        <i class="fa-solid fa-circle-exclamation text-5xl text-red-500 mb-4"></i>
                        <p class="text-red-500 font-bold mb-2">Failed to load packages.</p>
                        <p class="text-gray-600 mb-4">Please make sure the backend server is running.</p>
                        <button onclick="renderPackages()" class="mt-4 bg-brand-olive text-white px-6 py-2 rounded-full hover:bg-green-800">
                            Retry
                        </button>
                    </div>
                `;
            }
        }

        async function openBookingModal(packageId) {
            try {
                const pkgResponse = await fetch(`${API_BASE}/api/packages/${packageId}`);
                if (!pkgResponse.ok) throw new Error('Failed to fetch package');
                currentPackage = await pkgResponse.json();
                
                const sessionsResponse = await fetch(`${API_BASE}/api/packages/${packageId}/sessions`);
                if (!sessionsResponse.ok) throw new Error('Failed to fetch sessions');
                const sessions = await sessionsResponse.json();
                
                document.getElementById('modal-package-name').textContent = currentPackage.name;
                document.getElementById('booking-modal').classList.remove('hidden');
                document.getElementById('booking-form').classList.add('hidden');
                document.body.style.overflow = 'hidden';
                
                renderSessions(sessions);
            } catch (error) {
                showMessage('error', 'Could not open booking', 'Failed to load session details. Please try again.');
            }
        }

        function renderSessions(sessions) {
            const container = document.getElementById('session-list');
            if (!sessions || sessions.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-500 col-span-2">No available sessions for this package.</p>';
                return;
            }
            
            container.innerHTML = sessions.map(session => `
                <button onclick="selectSession(this, ${session.id})" 
                        data-session-id="${session.id}"
                        data-session-date="${session.date}"
                        data-session-label="${session.sessionLabel}"
                        class="session-btn p-6 border-2 border-transparent hover:border-brand-olive rounded-2xl text-left bg-white w-full">
                    <div class="font-semibold">${new Date(session.date).toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</div>
                    <div class="text-xl font-bold mt-1">${session.sessionLabel}</div>
                    <div class="text-green-600 mt-3">${session.availableSeats} seats left</div>
                </button>
            `).join('');
        }

        function selectSession(btn, sessionId) {
            document.querySelectorAll('.session-btn').forEach(b => b.classList.remove('border-brand-olive', 'bg-green-50'));
            btn.classList.add('border-brand-olive', 'bg-green-50');
            
            selectedSession = {
                id: sessionId,
                date: btn.dataset.sessionDate,
                label: btn.dataset.sessionLabel
            };
            document.getElementById('booking-form').classList.remove('hidden');
            updateTotal();
        }

        function updateTotal() {
            if (!currentPackage) return;
            const guests = parseInt(document.getElementById('guest-count').value) || 1;
            const total = currentPackage.pricePerPerson * guests;
            document.getElementById('total-price').textContent = `$${total}`;
        }

        async function confirmBooking() {
            if (!selectedSession) {
                showMessage('error', 'Missing session', 'Please select a session.');
                return;
            }
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const guestCount = parseInt(document.getElementById('guest-count').value);
            
            if (!name || !email || !phone) {
                showMessage('error', 'Missing guest information', 'Please fill in all guest information fields.');
                return;
            }
            
            const bookingData = {
                packageId: currentPackage.id,
                sessionId: selectedSession.id,
                customerName: name,
                customerEmail: email,
                customerPhone: phone,
                guestCount: guestCount,
                specialRequests: document.getElementById('special-request').value
            };
            
            try {
                const response = await fetch(`${API_BASE}/api/bookings`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(bookingData)
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showMessage('success', 'Reservation successful', `Booking reference: ${result.bookingReference}\nTotal: $${result.booking.totalPrice}\nYou can view it in My Bookings.`);
                    localStorage.setItem('buffetEaseEmail', email);
                    closeModal();
                    document.getElementById('name').value = '';
                    document.getElementById('email').value = '';
                    document.getElementById('phone').value = '852-';
                    document.getElementById('guest-count').value = '2';
                    document.getElementById('special-request').value = '';
                } else {
                    showMessage('error', 'Unable to create booking', result.error || 'Failed to create booking');
                }
            } catch (error) {
                showMessage('error', 'Connection failed', 'Failed to create booking. Please make sure the backend server is running.');
            }
        }

        function closeModal() {
            document.getElementById('booking-modal').classList.add('hidden');
            selectedSession = null;
            document.body.style.overflow = 'auto';
        }

        window.onload = () => {
            renderPackages();
        };
    </script>

    <!-- Booking Modal -->
    <div id="booking-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl max-w-4xl w-full mx-4 max-h-[95vh] overflow-hidden">
            <div class="p-8 border-b flex justify-between">
                <h3 id="modal-package-name" class="text-3xl serif"></h3>
                <button onclick="closeModal()" class="text-4xl leading-none hover:text-gray-400">&times;</button>
            </div>
            
            <div class="p-8 overflow-auto" style="max-height: 70vh;">
                <div id="session-list" class="grid sm:grid-cols-2 gap-4 mb-10"></div>
                
                <div id="booking-form" class="hidden bg-green-50 p-8 rounded-2xl">
                    <h4 class="text-2xl serif mb-6">Guest Information</h4>
                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium mb-2">Full Name</label>
                            <input id="name" type="text" class="w-full border rounded-2xl px-6 py-4" placeholder="Chan Tai Man"/>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">Email</label>
                            <input id="email" type="email" class="w-full border rounded-2xl px-6 py-4" placeholder="you@example.com"/>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">Phone</label>
                            <input id="phone" type="tel" value="852-" class="w-full border rounded-2xl px-6 py-4" maxlength="12"/>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">Number of Guests</label>
                            <input id="guest-count" type="number" min="1" value="2" class="w-full border rounded-2xl px-6 py-4" oninput="updateTotal()"/>
                        </div>
                    </div>
                    <div class="mt-6">
                        <label class="block text-sm font-medium mb-2">Special Requests</label>
                        <textarea id="special-request" rows="3" class="w-full border rounded-2xl px-6 py-4"></textarea>
                    </div>
                </div>
            </div>

            <div class="p-8 border-t bg-gray-50 flex justify-between items-center">
                <div>
                    <span class="text-gray-500">Total</span>
                    <div id="total-price" class="text-4xl font-bold text-brand-olive"></div>
                </div>
                <button onclick="confirmBooking()" class="bg-green-800 hover:bg-green-900 text-white px-12 py-5 rounded-full text-lg font-semibold transition-colors">
                    Confirm Reservation
                </button>
            </div>
        </div>
    </div>
</body>
</html>
