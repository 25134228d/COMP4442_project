# ═══════════════════════════════════════════════════════════════
# application.properties — Spring Boot application configuration
#
# This file is loaded automatically at startup.
# Values prefixed with ${ENV_VAR:default} are read from environment
# variables; if the variable is not set, the default value is used.
# ═══════════════════════════════════════════════════════════════

# ─── Server Configuration ───────────────────────────────────────
# The embedded Tomcat web server will listen on this port.
# Access the app at http://localhost:8080
server.port=8080

# ─── MySQL Database Configuration ───────────────────────────────
# JDBC connection URL format: jdbc:mysql://host:port/database?options
#   localhost:3306 — MySQL is running on the same machine, default port.
#   buffetease_db  — the database name (created by schma.sql).
#   useSSL=false   — disable SSL (fine for local/dev; enable in production).
#   serverTimezone=Asia/Hong_Kong — ensures date/time values are handled in HKT.
#   allowPublicKeyRetrieval=true  — required for some MySQL 8 authentication setups.
spring.datasource.url=jdbc:mysql://localhost:3306/buffetease_db?useSSL=false&serverTimezone=Asia/Hong_Kong&allowPublicKeyRetrieval=true

# Database username — read from the DB_USERNAME environment variable.
# If DB_USERNAME is not set, falls back to "admin".
spring.datasource.username=${DB_USERNAME:admin}

# Database password — read from the DB_PASSWORD environment variable.
# If DB_PASSWORD is not set, falls back to "admin123".
spring.datasource.password=${DB_PASSWORD:admin123}

# The JDBC driver class for MySQL 8 (Connector/J 8+).
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate Configuration ──────────────────────────────
# ddl-auto=validate — Hibernate checks that the DB schema matches the entity classes
# but does NOT create or modify tables. Use schma.sql to set up tables manually.
# Other options: create (drop+create), update (alter), none (no check).
spring.jpa.hibernate.ddl-auto=validate

# Print every SQL statement Hibernate executes to the console (useful for debugging).
spring.jpa.show-sql=true

# Format the printed SQL with indentation so it's easier to read.
spring.jpa.properties.hibernate.format_sql=true

# Tell Hibernate which SQL dialect to use when generating queries.
# MySQL8Dialect supports MySQL 8 features like JSON columns, window functions, etc.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ─── Logging ─────────────────────────────────────────────────────
# Set our application's log level to DEBUG — prints detailed info about what the app is doing.
logging.level.com.buffetease=DEBUG

# Also print Hibernate's SQL statements at DEBUG level for detailed query inspection.
logging.level.org.hibernate.SQL=DEBUG
