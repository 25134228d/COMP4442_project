# Server Configuration
server.port=8080

# MySQL Database Configuration - CHECK THESE LINES
spring.datasource.url=jdbc:mysql://localhost:3306/buffetease_db?useSSL=false&serverTimezone=Asia/Hong_Kong&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:admin123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Logging
logging.level.com.buffetease=DEBUG
logging.level.org.hibernate.SQL=DEBUG